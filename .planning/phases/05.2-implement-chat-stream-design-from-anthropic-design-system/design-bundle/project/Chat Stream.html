<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Joe's Agent — Chat Stream</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-page: #f3f1ec;
    --bg-page-2: #e6e2db;
    --panel: #ffffff;
    --header-bg: rgba(246,246,247,.86);
    --hairline: rgba(0,0,0,.10);
    --text: #0a0a0a;
    --muted: #8a8a8e;
    --me: #2080ff;       /* outgoing — clean modern blue, not Apple's exact #007AFF */
    --me-fg: #ffffff;
    --them: #2c2c2e;     /* incoming — dark grey */
    --them-fg: #ffffff;
    --composer-bg: rgba(246,246,247,.92);
    --input-bg: #ffffff;
  }
  .dark {
    --bg-page: #1a1a1c;
    --bg-page-2: #0e0e10;
    --panel: #000000;
    --header-bg: rgba(28,28,30,.86);
    --hairline: rgba(255,255,255,.10);
    --text: #f5f5f7;
    --muted: #98989d;
    --me: #2e87ff;
    --them: #2c2c2e;
    --composer-bg: rgba(20,20,22,.92);
    --input-bg: #1c1c1e;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(1200px 700px at 50% -10%, var(--bg-page) 0%, var(--bg-page-2) 70%),
      var(--bg-page-2);
    color: var(--text);
    display: grid;
    place-items: center;
    padding: 32px 16px;
    transition: background .3s ease;
  }

  .stage { width: 100%; display: grid; place-items: center; }

  /* The chat panel — a card on the page (no device frame). */
  .phone-shell {
    width: min(440px, 100%);
    height: min(720px, calc(100vh - 64px));
    background: var(--panel);
    color: var(--text);
    border-radius: 28px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      0 1px 0 rgba(255,255,255,.04) inset,
      0 30px 60px -20px rgba(15,15,20,.18),
      0 12px 30px -12px rgba(15,15,20,.10);
    border: 1px solid var(--hairline);
    transition: background .3s ease, border-color .3s ease;
  }
  .dark .phone-shell {
    box-shadow:
      0 1px 0 rgba(255,255,255,.04) inset,
      0 30px 80px -20px rgba(0,0,0,.7),
      0 0 0 1px rgba(255,255,255,.04);
  }

  /* Header */
  .chat-header {
    flex-shrink: 0;
    height: 88px;
    padding: 14px 8px 10px;
    display: grid;
    grid-template-columns: 56px 1fr 56px;
    align-items: end;
    background: var(--header-bg);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border-bottom: .5px solid var(--hairline);
    position: relative;
  }
  .header-left, .header-right { display: flex; align-items: center; height: 100%; }
  .header-left { justify-content: flex-start; padding-left: 10px; }
  .header-right { justify-content: flex-end; padding-right: 10px; }
  .back-btn, .replay-btn {
    appearance: none; background: transparent; border: 0; padding: 6px;
    color: var(--me); cursor: pointer; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .replay-btn { color: var(--me); }
  .replay-btn:hover { background: rgba(32,128,255,.10); }

  .header-center {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; min-width: 0;
  }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #b8b8be 0%, #6e6e74 100%);
    display: grid; place-items: center;
    color: #fff; font-weight: 600; font-size: 13px; letter-spacing: .02em;
    box-shadow: 0 1px 2px rgba(0,0,0,.15);
  }
  .dark .avatar {
    background: linear-gradient(135deg, #5a5a60 0%, #2c2c30 100%);
  }
  .contact-name {
    font-size: 11px; font-weight: 500; color: var(--text);
    display: inline-flex; align-items: center; gap: 3px;
    letter-spacing: -.005em;
  }
  .chev { color: var(--muted); margin-top: 1px; }

  /* Scroll region */
  .chat-scroll {
    flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,0,0,.15) transparent;
    scroll-behavior: smooth;
  }
  .chat-scroll::-webkit-scrollbar { width: 6px; }
  .chat-scroll::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,.15); border-radius: 3px;
  }
  .dark .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); }

  .chat-inner {
    padding: 14px 12px 18px;
    display: flex; flex-direction: column; gap: 2px;
  }

  /* Timestamps */
  .timestamp {
    align-self: center;
    font-size: 11px; font-weight: 500; color: var(--muted);
    padding: 16px 0 10px;
    letter-spacing: -.005em;
  }
  .timestamp:first-child { padding-top: 6px; }

  /* Bubble rows */
  .bubble-row {
    display: flex; width: 100%; padding: 1px 4px;
    animation: pop .28s cubic-bezier(.22,1,.36,1);
  }
  .bubble-row.me   { justify-content: flex-end; }
  .bubble-row.them { justify-content: flex-start; }

  .bubble {
    max-width: 78%;
    padding: 8px 13px 9px;
    font-size: 16px;
    line-height: 1.28;
    letter-spacing: -.01em;
    word-wrap: break-word;
    overflow-wrap: anywhere;
    text-wrap: pretty;
    position: relative;
  }
  .bubble-me   { background: var(--me);   color: var(--me-fg);   }
  .bubble-them { background: var(--them); color: var(--them-fg); }

  /* Typing indicator */
  .bubble.typing {
    padding: 12px 14px;
    display: inline-flex; gap: 4px; align-items: center;
  }
  .bubble.typing .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,.55);
    animation: blink 1.2s infinite ease-in-out;
  }
  .bubble.typing .dot:nth-child(2) { animation-delay: .15s; }
  .bubble.typing .dot:nth-child(3) { animation-delay: .30s; }

  @keyframes blink {
    0%, 60%, 100% { opacity: .35; transform: translateY(0); }
    30%           { opacity: 1;  transform: translateY(-2px); }
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(6px) scale(.96); }
    to   { opacity: 1; transform: translateY(0)   scale(1);   }
  }

  /* Composer */
  .composer {
    flex-shrink: 0;
    padding: 8px 10px 14px;
    display: flex; align-items: center; gap: 8px;
    background: var(--composer-bg);
    border-top: .5px solid var(--hairline);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .plus-btn {
    flex-shrink: 0;
    width: 32px; height: 32px; border-radius: 50%;
    border: 0; background: rgba(120,120,128,.16); color: var(--muted);
    display: grid; place-items: center; cursor: pointer;
  }
  .input-shell {
    flex: 1; height: 34px; border-radius: 17px;
    border: .5px solid var(--hairline);
    background: var(--input-bg);
    display: flex; align-items: center;
    padding: 0 6px 0 14px;
    color: var(--muted);
  }
  .placeholder { flex: 1; font-size: 15px; letter-spacing: -.01em; }
  .mic-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 0; background: transparent; color: var(--muted);
    display: grid; place-items: center; cursor: pointer;
  }

  /* Caption under the panel */
  .caption {
    margin-top: 18px;
    font-size: 12px;
    color: rgba(15,15,20,.45);
    text-align: center;
    letter-spacing: -.005em;
  }
  .dark .caption { color: rgba(245,245,247,.45); }

  /* ── View toggle pill ─────────────────────────────────────────────────── */
  .view-toggle {
    position: fixed; top: 18px; right: 18px;
    z-index: 50;
    display: inline-flex; padding: 3px;
    background: rgba(255,255,255,.78);
    border: .5px solid rgba(0,0,0,.08);
    border-radius: 999px;
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow: 0 4px 20px -8px rgba(15,15,20,.18), 0 1px 0 rgba(255,255,255,.6) inset;
    font-family: 'Inter', -apple-system, sans-serif;
  }
  body.dark .view-toggle {
    background: rgba(28,28,30,.78);
    border-color: rgba(255,255,255,.08);
    box-shadow: 0 4px 20px -8px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.04) inset;
  }
  body.matrix-mode .view-toggle {
    background: rgba(0,15,5,.7);
    border: .5px solid rgba(0,255,100,.25);
    box-shadow: 0 0 24px rgba(0,255,100,.15), 0 1px 0 rgba(0,255,100,.1) inset;
  }
  .view-toggle button {
    appearance: none; border: 0; background: transparent;
    padding: 7px 16px; border-radius: 999px;
    font-size: 12.5px; font-weight: 500; letter-spacing: -.005em;
    color: var(--muted);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: color .2s;
  }
  .view-toggle button.active {
    background: var(--text);
    color: var(--panel);
  }
  body.matrix-mode .view-toggle button { color: rgba(0,255,100,.55); font-family: 'Share Tech Mono', monospace; text-transform: uppercase; letter-spacing: .08em; font-size: 11px; }
  body.matrix-mode .view-toggle button.active {
    background: rgba(0,255,100,.18); color: #d6ffe6;
    box-shadow: 0 0 12px rgba(0,255,100,.3) inset;
  }
  .view-toggle .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: currentColor; opacity: .55;
  }

  /* ── Matrix mode page ─────────────────────────────────────────────────── */
  body.matrix-mode {
    background: #000;
  }

  /* In matrix mode the chat panel sits ON TOP of the rain, restyled
     as a terminal: black-translucent background, green monospace text,
     green-glow borders. Same conversation plays — different skin. */
  body.matrix-mode .stage { position: relative; z-index: 5; }

  body.matrix-mode .phone-shell {
    background: rgba(0, 12, 4, .72);
    border: 1px solid rgba(0, 255, 100, .35);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0, 255, 100, .12),
      0 0 40px rgba(0, 255, 100, .18),
      0 0 80px rgba(0, 255, 100, .08),
      inset 0 0 30px rgba(0, 60, 20, .25);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    color: #9bff9b;
  }
  body.matrix-mode .chat-header {
    background: rgba(0, 20, 8, .55);
    border-bottom: 1px solid rgba(0, 255, 100, .25);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }
  body.matrix-mode .back-btn,
  body.matrix-mode .replay-btn { color: #9bff9b; }
  body.matrix-mode .replay-btn:hover { background: rgba(0, 255, 100, .12); }
  body.matrix-mode .avatar {
    background: rgba(0, 30, 12, .8);
    border: 1px solid rgba(0, 255, 100, .45);
    color: #9bff9b;
    box-shadow: 0 0 12px rgba(0, 255, 100, .35);
    font-family: 'Share Tech Mono', monospace;
  }
  body.matrix-mode .contact-name {
    color: #d6ffe6;
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .12em;
    font-size: 10px;
  }
  body.matrix-mode .chev { color: rgba(0, 255, 100, .5); }

  body.matrix-mode .timestamp {
    color: rgba(0, 255, 100, .55);
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .15em;
    font-size: 10px;
  }

  body.matrix-mode .bubble {
    font-family: 'Share Tech Mono', "Courier New", monospace;
    font-size: 14px;
    letter-spacing: .01em;
    line-height: 1.35;
  }
  /* Outgoing — Joe's agent. Solid green fill, black text — the "system speaks". */
  body.matrix-mode .bubble-me {
    background: linear-gradient(180deg, rgba(0,255,100,.92), rgba(0,200,80,.85));
    color: #001a08;
    box-shadow:
      0 0 12px rgba(0, 255, 100, .55),
      inset 0 0 1px rgba(255, 255, 255, .4);
    text-shadow: 0 0 1px rgba(0, 255, 100, .4);
  }
  /* Incoming — recruiter. Outlined "received signal" look. */
  body.matrix-mode .bubble-them {
    background: rgba(0, 25, 10, .65);
    color: #9bff9b;
    border: 1px solid rgba(0, 255, 100, .45);
    box-shadow: 0 0 8px rgba(0, 255, 100, .15);
    text-shadow: 0 0 6px rgba(0, 255, 100, .4);
  }
  body.matrix-mode .bubble.typing .dot {
    background: #9bff9b;
    box-shadow: 0 0 6px rgba(0, 255, 100, .6);
  }
  body.matrix-mode .bubble.bubble-me.typing .dot {
    background: #001a08;
    box-shadow: none;
  }

  body.matrix-mode .composer {
    background: rgba(0, 20, 8, .55);
    border-top: 1px solid rgba(0, 255, 100, .25);
  }
  body.matrix-mode .plus-btn {
    background: rgba(0, 40, 16, .6);
    color: #9bff9b;
    border: 1px solid rgba(0, 255, 100, .3);
  }
  body.matrix-mode .input-shell {
    background: rgba(0, 20, 8, .6);
    border: 1px solid rgba(0, 255, 100, .35);
    color: rgba(0, 255, 100, .55);
  }
  body.matrix-mode .placeholder {
    font-family: 'Share Tech Mono', monospace;
    text-transform: uppercase;
    letter-spacing: .15em;
    font-size: 11px;
  }
  body.matrix-mode .placeholder::before { content: '> '; }
  body.matrix-mode .mic-btn { color: #9bff9b; }

  /* Subtle CRT flicker on the panel itself — very gentle. */
  @keyframes matrix-flicker {
    0%, 100% { opacity: 1; }
    50%      { opacity: .985; }
  }
  body.matrix-mode .phone-shell { animation: matrix-flicker 4s infinite; }

  .matrix-stage {
    position: fixed; inset: 0; z-index: 1;
    background: #000;
    pointer-events: none;
    opacity: 0;
    transition: opacity .4s ease;
  }
  .matrix-stage.on { opacity: 1; }
  .matrix-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .matrix-vignette {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.55) 100%);
    mix-blend-mode: multiply;
  }
  .matrix-scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,.18) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode: multiply;
    opacity: .6;
  }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone-shell { border-radius: 0; height: 100vh; width: 100vw; border: 0; }
    .caption { display: none; }
  }
</style>
</head>
<body>
  <div id="root" class="stage"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="chat.jsx"></script>
  <script type="text/babel" src="matrix-rain.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dark": false
    }/*EDITMODE-END*/;

    function ViewToggle({ view, onChange }) {
      return (
        <div className="view-toggle" role="tablist" aria-label="View">
          <button role="tab" aria-selected={view === 'chat'}
                  className={view === 'chat' ? 'active' : ''}
                  onClick={() => onChange('chat')}>
            <span className="dot" /> Light Mode
          </button>
          <button role="tab" aria-selected={view === 'matrix'}
                  className={view === 'matrix' ? 'active' : ''}
                  onClick={() => onChange('matrix')}>
            <span className="dot" /> Dark Mode
          </button>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [replaySignal, setReplaySignal] = React.useState(0);
      const [view, setView] = React.useState('chat');

      // Light/dark + matrix-mode side-effects on body so page bg responds.
      React.useEffect(() => {
        document.body.classList.toggle('dark', !!t.dark && view !== 'matrix');
        document.body.classList.toggle('matrix-mode', view === 'matrix');
      }, [t.dark, view]);

      return (
        <>
          <ViewToggle view={view} onChange={setView} />
          <div className="stage">
            <Chat key={replaySignal} dark={!!t.dark}
                  onReplay={() => setReplaySignal((n) => n + 1)} />
          </div>
          <MatrixRain visible={view === 'matrix'} />
          <TweaksPanel title="Tweaks">
            <TweakSection label="Appearance" />
            <TweakToggle label="Dark mode" value={!!t.dark}
                         onChange={(v) => setTweak('dark', v)} />
            <TweakSection label="Demo" />
            <TweakButton label="Replay conversation"
                         onClick={() => setReplaySignal((n) => n + 1)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
