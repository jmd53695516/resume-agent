    Agent SHOULD answer with the real product: SEI Data Cloud (Snowflake-based), centralizing accounting and CRM data. Should mention Cortex AI forecasting capability as a notable shipped feature. No fabricated details (e.g., specific revenue figures, employee count, founding date).
