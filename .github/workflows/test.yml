name: test

# Zero-secrets pre-flight gate. Runs on every PR (any branch into main) and on
# push to main. Closes the 06-06 Task 8 instrumentation gap: SAFE-11 system-prompt
# determinism (17 tests in tests/lib/system-prompt.test.ts) and the rest of the
# vitest + tsc + lint + next build matrix were verified manually only.
#
# Phase 7 D-B-02..04 hard rule: this file references ZERO real credentials.
# Structural separation from .github/workflows/eval.yml (which DOES spend on
# Anthropic) — prevents the 2026-05-12 spend-cap incident pattern where a CI
# run could burn budget on every PR. All env vars in the `env:` block below are
# literal sentinel placeholder strings captured from a clean-env shell during
# Plan 07-1A Task 8 (see 07-1A-SUMMARY.md Handoff section for provenance).

on:
  pull_request:
  push:
    branches:
      - main

# T-07-02-01 mitigation: least-privilege permissions. Drops `actions: read` and
# `statuses: write` that eval.yml needs for its notify-vercel step — this
# workflow has no external integrations.
permissions:
  contents: read

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      # 12-var sentinel block — copied verbatim from 07-1A-SUMMARY Handoff.
      # These are LITERAL placeholder strings (NO CI-injected credentials).
      # Phase 7 D-B-02..04 hard rule. T-07-02-02 mitigation.
      NEXT_PUBLIC_SUPABASE_URL: 'https://sentinel.local'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'sentinel-anon-key'
      SUPABASE_SERVICE_ROLE_KEY: 'sentinel-service-role-key'
      ANTHROPIC_API_KEY: 'sentinel-do-not-use'
      EXA_API_KEY: 'sentinel-do-not-use'
      GOOGLE_GENERATIVE_AI_API_KEY: 'sentinel-do-not-use'
      UPSTASH_REDIS_REST_URL: 'https://sentinel.local'
      UPSTASH_REDIS_REST_TOKEN: 'sentinel-do-not-use'
      RESEND_API_KEY: 'sentinel-do-not-use'
      CRON_SECRET: 'sentinel-do-not-use'
      ADMIN_GITHUB_LOGINS: 'sentinel-login'
    steps:
      # T-07-02-03 + T-07-02-08 mitigation: untrusted-PR-safe trigger plus
      # immutable commit-SHA checkout ref. Defeats tag-swap and mid-run-rewrite
      # workflow-injection vectors. Trigger above is plain pull-request (the
      # write-token-bearing variant is explicitly NOT used; see threat model).
      - name: Checkout (commit SHA, not branch ref)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint (src/ only)
        run: npm run lint

      - name: Next.js build
        run: npm run build
