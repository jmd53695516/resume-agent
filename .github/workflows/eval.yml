name: eval

on:
  repository_dispatch:
    types:
      - 'vercel.deployment.ready'
      - 'scheduled-eval'
  workflow_dispatch: {}

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
      statuses: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.git.sha || github.sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Run eval suite
        env:
          EVAL_TARGET_URL: ${{ github.event.client_payload.url || github.event.client_payload.target_url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          JOE_NOTIFICATION_EMAIL: ${{ secrets.JOE_NOTIFICATION_EMAIL }}
          ADMIN_GITHUB_LOGINS: ${{ secrets.ADMIN_GITHUB_LOGINS }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GIT_SHA: ${{ github.event.client_payload.git.sha || github.sha }}
          EVAL_SCHEDULED: ${{ github.event.action == 'scheduled-eval' && '1' || '0' }}
        run: npm run eval

      - name: 'notify vercel'
        if: github.event_name == 'repository_dispatch' && always()
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: 'Vercel - resume-agent-eyap: eval'
          github_token: ${{ secrets.GITHUB_TOKEN }}
