# Phase 5 Plan 05-02 scaffold. Plan 05-10 replaces the no-op step with the
# real eval CLI invocation. Workflow + job name LOCKED ('eval' / 'eval:')
# because GitHub branch protection (set in 05-10) matches workflow_name/job_name.
# Renaming breaks the required-check binding silently. RESEARCH §3.
# Workflow MUST exist on master FIRST per Pitfall 3 — repository_dispatch only
# fires workflows on the default branch.

name: eval

on:
  repository_dispatch:
    types:
      - 'vercel.deployment.ready'
      - 'scheduled-eval'
  workflow_dispatch: {}

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: No-op scaffold (Plan 05-10 replaces this)
        run: |
          echo "Plan 05-02 scaffold; eval CLI lands in Plan 05-03 and is wired here in Plan 05-10."
          echo "Event: ${{ github.event_name }}"
          echo "Payload URL: ${{ github.event.client_payload.url || 'n/a' }}"
          exit 0
